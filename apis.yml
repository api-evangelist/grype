aid: grype
name: Grype
description: >-
  Grype is an open source vulnerability scanner for container images and
  filesystems developed by Anchore. It works with Syft-generated SBOMs and
  supports major OS package ecosystems and language-specific packages including
  Go, Java, JavaScript, Python, Ruby, Rust, and .NET.
